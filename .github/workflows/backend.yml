name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  test:
    name: Backend lint, schema, and smoke test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres1234
          POSTGRES_DB: salesforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: |
          set -e
          echo "PWD: $(pwd)"
          rm -rf node_modules package-lock.json
          npm install --no-audit --no-fund --loglevel=warn --legacy-peer-deps
          echo "Installed: $(ls node_modules | wc -l) top-level packages"
          echo "--- verify critical modules ---"
          for m in express @prisma/client bcryptjs jsonwebtoken cors; do
            if [ ! -d "node_modules/$m" ]; then
              echo "CRITICAL: $m missing"
              exit 1
            fi
            echo "  $m OK"
          done
          echo "--- optional modules (warn only) ---"
          for m in compression helmet response-time morgan; do
            if [ -d "node_modules/$m" ]; then
              echo "  $m OK"
            else
              echo "  $m: not installed (optional, app will run with fallbacks)"
            fi
          done
          echo "Install complete"

      - name: Generate Prisma client
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres1234@localhost:5432/salesforge_test
          DIRECT_URL: postgresql://postgres:postgres1234@localhost:5432/salesforge_test
        run: npx prisma generate

      - name: Run Prisma format check
        working-directory: backend
        run: npx prisma format --check || npx prisma format

      - name: Validate Prisma schema
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres1234@localhost:5432/salesforge_test
          DIRECT_URL: postgresql://postgres:postgres1234@localhost:5432/salesforge_test
        run: npx prisma validate

      - name: Lint backend
        working-directory: backend
        run: |
          if [ -f package.json ] && grep -q '"lint"' package.json; then
            npm run lint
          else
            echo "No lint script, skipping"
          fi

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres1234@localhost:5432/salesforge_test
          DIRECT_URL: postgresql://postgres:postgres1234@localhost:5432/salesforge_test
        run: |
          npx prisma db push --skip-generate --accept-data-loss || npx prisma migrate deploy

      - name: Seed database
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres1234@localhost:5432/salesforge_test
          DIRECT_URL: postgresql://postgres:postgres1234@localhost:5432/salesforge_test
        run: node prisma/seed.js

      - name: Boot server
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres1234@localhost:5432/salesforge_test
          DIRECT_URL: postgresql://postgres:postgres1234@localhost:5432/salesforge_test
          PORT: 3001
          NODE_ENV: test
          JWT_SECRET: test-secret-for-ci
        run: |
          nohup node server.js > /tmp/sf-backend.log 2>&1 &
          echo $! > /tmp/sf-backend.pid
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3001/api/health >/dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Smoke-test endpoints
        env:
          API: http://localhost:3001
        run: |
          bash -c '
          set -e
          curl -fsS $API/api/health | grep -q "ok"
          echo "Health endpoint OK"

          LOGIN=$(curl -fsS -X POST $API/api/auth/login \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"demo@salesforge.com\",\"password\":\"Demo1234!\"}")
          echo "Login response: $LOGIN"

          TOKEN=$(echo "$LOGIN" | node -e "let d=\"\";process.stdin.on(\"data\",c=>d+=c).on(\"end\",()=>{const j=JSON.parse(d); console.log(j.data?.token || j.token || \"\")})")
          if [ -z "$TOKEN" ]; then
            echo "FAILED: no token returned"
            exit 1
          fi
          echo "Got token: ${TOKEN:0:20}..."

          for ep in /api/leads /api/deals /api/organizations /api/activities /api/users /api/tags /api/notifications /api/contacts /api/territories /api/quotas /api/commissions /api/calls /api/documents /api/contracts /api/surveys /api/tickets /api/campaigns /api/kb /api/health-scores /api/ai-scoring/insights /api/search /api/products /api/quotes /api/playbooks /api/win-loss /api/reports /api/forecasts /api/sequences /api/workflows /api/templates /api/custom-fields /api/analytics/global; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $TOKEN" $API$ep)
            echo "  $ep -> $CODE"
            if [ "$CODE" != "200" ]; then
              echo "FAILED: $ep returned $CODE"
              exit 1
            fi
          done
          echo "All 32 endpoints OK"
          '

      - name: Show backend log on failure
        if: failure()
        run: |
          cat /tmp/sf-backend.log || true

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/sf-backend.pid ]; then
            kill $(cat /tmp/sf-backend.pid) 2>/dev/null || true
          fi
